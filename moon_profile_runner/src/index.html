<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoonProfile Runner</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>MoonProfile Runner</h1>
      <p class="subtitle">Running in the background - local server open on port 47991, no authentication (local network).</p>

      <section class="card">
        <h2>Status</h2>
        <p id="status">Active</p>
      </section>

      <section class="card">
        <h2>Clients</h2>
        <p id="clients-empty" class="placeholder">No client has connected to this host yet.</p>
        <ul id="clients-list" class="clients-list"></ul>
      </section>
    </main>
  </body>
</html>
